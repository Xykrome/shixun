<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>受保护页面 - Mini Web Server</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 720px;
            margin: 60px auto;
            padding: 0 20px;
            background: #f8f9fa;
            color: #212529;
        }
        h1 { color: #198754; border-bottom: 2px solid #198754; padding-bottom: 8px; }
        .badge { background: #198754; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.85em; }
        .info { background: #e8f4f8; border-left: 4px solid #0dcaf0; padding: 12px 16px; margin: 16px 0; border-radius: 0 4px 4px 0; }
    </style>
</head>
<body>
    <h1>🔒 受保护页面</h1>
    <p><span class="badge">已认证</span></p>
    <p>恭喜！你已通过 HTTP Basic 认证成功访问此页面。</p>
    <div class="info">
        <strong>说明：</strong>此页面通过 <code>Authorization: Basic</code> 请求头进行身份验证。<br>
        账号：<code>student</code>，密码：<code>lab123</code>
    </div>
    <p><a href="/">← 返回首页（公开访问）</a></p>
    <hr>
    <p style="color: #6c757d; font-size: 0.85em;">Mini Web Server V1.5 — HTTP Basic 认证演示</p>
</body>
</html>
