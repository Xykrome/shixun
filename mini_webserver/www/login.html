<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>登录 - Mini Web Server</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 500px;
            margin: 60px auto;
            padding: 0 20px;
            background: #f8f9fa;
            color: #212529;
        }
        h1 { color: #0d6efd; border-bottom: 2px solid #0d6efd; padding-bottom: 8px; }
        form { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { display: block; margin: 12px 0 4px; font-weight: 600; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 8px 12px; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 16px; box-sizing: border-box;
        }
        button {
            margin-top: 16px; padding: 10px 24px;
            background: #0d6efd; color: white; border: none;
            border-radius: 4px; font-size: 16px; cursor: pointer;
        }
        button:hover { background: #0b5ed7; }
        .info { background: #e8f4f8; border-left: 4px solid #0dcaf0; padding: 12px 16px; margin: 16px 0; border-radius: 0 4px 4px 0; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Session 登录</h1>
    <div class="info">
        <strong>演示账号：</strong><br>
        用户名：<code>student</code>，密码：<code>lab123</code><br>
        <small>登录成功后创建服务端会话，Cookie 设置 HttpOnly + SameSite=Strict</small>
    </div>
    <form method="POST" action="/login">
        <label for="username">用户名：</label>
        <input type="text" id="username" name="username" placeholder="输入用户名" required>

        <label for="password">密码：</label>
        <input type="password" id="password" name="password" placeholder="输入密码" required>

        <button type="submit">登录</button>
    </form>
    <p style="margin-top: 20px; font-size: 0.9em;">
        <a href="/">← 返回首页</a> |
        <a href="/secured">Basic Auth 页面 →</a> |
        <a href="/dashboard">Dashboard →</a>
    </p>
    <hr>
    <p style="color: #6c757d; font-size: 0.85em;">Mini Web Server V1.5 — Session 认证演示</p>
</body>
</html>
